<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MMZ5XH4V" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="container">
    <header>
        <h1>SPICE PWL Generator</h1>
        <details style="font-size:0.82em;color:#666;margin-top:8px;">
            <summary style="cursor:pointer;">操作方法</summary>
            <ul style="margin:6px 0 0 1.2em;line-height:1.8;">
                <li><strong>ダブルクリック</strong>: 波形上に点を追加</li>
                <li><strong>クリック</strong>: 点を選択</li>
                <li><strong>ドラッグ</strong>: 選択した点を移動</li>
                <li><strong>右ドラッグ</strong>: 表示をパン</li>
                <li><strong>ホイール</strong>: 両軸ズーム / <strong>Shift+ホイール</strong>: X軸 / <strong>Ctrl+ホイール</strong>: Y軸</li>
                <li><strong>Delete</strong>: 選択した点を削除</li>
                <li><strong>F</strong>: 全点が収まるようにオートスケール</li>
            </ul>
        </details>
    </header>

    <!-- toolbar -->
    <div class="toolbar">
        <label>Source</label>
        <select id="srcType">
            <option value="V">Voltage</option>
            <option value="I">Current</option>
        </select>

        <div class="sep"></div>

        <label>Time</label>
        <select id="timeUnit">
            <option value="1e-15">fs</option>
            <option value="1e-12">ps</option>
            <option value="1e-9">ns</option>
            <option value="1e-6" selected>µs</option>
            <option value="1e-3">ms</option>
            <option value="1">s</option>
        </select>

        <label>Value</label>
        <select id="valUnit">
            <option value="1e-6">µV</option>
            <option value="1e-3" selected>mV</option>
            <option value="1">V</option>
            <option value="1e3">kV</option>
        </select>

        <div class="sep"></div>

        <div class="snap-row">
            <input type="checkbox" id="snapEnable">
            <label for="snapEnable">Grid snap</label>
        </div>
        <div class="snap-fields">
            <label>T:</label>
            <input type="number" id="snapT" value="1" min="0.001" step="0.1">
            <label>V:</label>
            <input type="number" id="snapV" value="1" min="0.001" step="0.1">
        </div>

        <div class="sep"></div>

        <label>min ΔT:</label>
        <input type="number" id="minDtInput" value="0.001" min="0" step="any" title="時間の最小分離幅（現在の時間単位）">

        <div class="sep"></div>

        <button id="btnAutoScale" title="F">Auto Scale</button>
        <button id="btnCopy" class="secondary">Copy PWL</button>
    </div>

    <div class="main">
        <!-- canvas -->
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="plot"></canvas>
        </div>

        <!-- right panel -->
        <div class="side">
            <!-- view range -->
            <div class="panel">
                <h3>View Range</h3>
                <div class="field-row"><label>X min</label><input type="number" id="xMin" value="0" step="0.1"></div>
                <div class="field-row"><label>X max</label><input type="number" id="xMax" value="10" step="0.1"></div>
                <div class="field-row"><label>Y min</label><input type="number" id="yMin" value="-5" step="0.1"></div>
                <div class="field-row"><label>Y max</label><input type="number" id="yMax" value="5" step="0.1"></div>
            </div>

            <!-- selected point editor -->
            <div class="panel" id="pointEditor" style="display:none">
                <h3>Selected Point</h3>
                <div class="field-row"><label>Time</label><input type="number" id="editT" step="any"></div>
                <div class="field-row"><label>Value</label><input type="number" id="editV" step="any"></div>
                <button id="btnDelPoint" class="danger" style="width:100%;margin-top:4px;">Delete Point</button>
            </div>

            <!-- point list -->
            <div class="panel" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
                <h3>Points</h3>
                <div class="point-list" id="pointList"></div>
                <button id="btnAddPoint" style="margin-top:8px;width:100%;">+ Add Point</button>
            </div>
        </div>
    </div>

    <!-- status / output -->
    <div class="statusbar">
        <span id="statusMsg">ダブルクリックで点を追加</span>
        <span id="cursorCoord"></span>
    </div>
    <div style="margin-top:8px;">
        <textarea class="output-area" id="pwlOutput" rows="3" spellcheck="false" readonly></textarea>
    </div>
</div>

<script src="app.js"></script>
