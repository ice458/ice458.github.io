name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Inject GTM and SEO into SymTF and pio_sim
        run: |
          # Inject SymTF
          awk '/<\/head>/{system("cat .github/inject/symtf_head.html")}1' tools/SymTF/index.html > tmp.html && mv tmp.html tools/SymTF/index.html
          awk '1;/<body>/{system("cat .github/inject/symtf_body.html")}' tools/SymTF/index.html > tmp.html && mv tmp.html tools/SymTF/index.html
          awk '/<footer class="site-footer">/{system("cat .github/inject/symtf_footer.html"); skip=1} /<\/footer>/{skip=0; next} !skip{print}' tools/SymTF/index.html > tmp.html && mv tmp.html tools/SymTF/index.html
          
          # Inject pio_sim
          awk '/<\/head>/{system("cat .github/inject/pio_sim_head.html")}1' tools/pio_sim/index.html > tmp.html && mv tmp.html tools/pio_sim/index.html
          awk '1;/<body.*>/{system("cat .github/inject/pio_sim_body.html")}' tools/pio_sim/index.html > tmp.html && mv tmp.html tools/pio_sim/index.html
          awk '/<footer/{system("cat .github/inject/pio_sim_footer.html"); skip=1} /<\/footer>/{skip=0; next} !skip{print}' tools/pio_sim/index.html > tmp.html && mv tmp.html tools/pio_sim/index.html
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
