plugins:
  - jekyll-sitemap

# GitHub Pages Jekyll設定
title: ice458の物置き
description: ice458の製作物等を紹介するサイトです
url: https://ice458.github.io
baseurl: ""

# 除外設定（ビルド成果物から除外＝公開されない）
# パターンは FNM_PATHNAME なしの fnmatch で照合されるため "*" が "/" にもマッチし、
# "*.py" はネストした .py（tools/SymTF/test_engine.py 等）にも及ぶ。
exclude:
  - README.md
  - "*.py"
  - "*.bat"
  - __pycache__/
  - templates/
  - "*.md"

# include は exclude より優先される（Jekyll は included? を先に評価して打ち切る）。
# engine.py は SymTF が実行時に fetch するため、上の "*.py" から除外し返す必要がある。
# 照合はベース名に対して行われるので test_engine.py は巻き込まれない。
include:
  - engine.py

# ビルド設定
markdown: kramdown
highlighter: rouge

# パーマリンク設定（重要: ディレクトリ形式URL対応）
permalink: pretty

# SEO設定
lang: ja
author: ice458

# デフォルト設定
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: null
      sitemap: true